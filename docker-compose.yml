version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: justenant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: justenant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: justenant_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
